# /etc/keepalived/keepalived.conf
# Node: DC2 VM4
# Role: BACKUP 3

global_defs {
    router_id DC2_VM4
    enable_script_security
    script_user root
}

vrrp_script check_nginx {
    script   "/etc/keepalived/scripts/check_nginx.sh"
    interval 2
    weight   -30
    fall     2
    rise     2
}

vrrp_instance VI_1 {
    state             BACKUP
    interface         CHANGE_ME_INTERFACE
    virtual_router_id 51
    priority          50
    advert_int        1
    nopreempt

    authentication {
        auth_type PASS
        auth_pass CHANGE_ME_VRRP_SECRET
    }

    virtual_ipaddress {
        CHANGE_ME_VIP/24 dev CHANGE_ME_INTERFACE
    }

    track_script {
        check_nginx
    }

    notify /etc/keepalived/scripts/notify.sh
}
