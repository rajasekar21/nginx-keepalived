upstream backend_app {
    zone backend_app 64k;

    server CHANGE_ME_BACKEND_1:8080 max_fails=3 fail_timeout=10s;
    server CHANGE_ME_BACKEND_2:8080 max_fails=3 fail_timeout=10s;

    keepalive 32;
}

server {
    listen 8080 default_server;
    server_name _;

    access_log /var/log/nginx/vip-access.log main;
    error_log /var/log/nginx/vip-error.log warn;

    location = /nginx-health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location / {
        proxy_pass http://backend_app;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 3s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
    }
}
